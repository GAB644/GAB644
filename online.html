<script> // normal scripst
    document.addEventListener('DOMContentLoaded', () => {
  const notesArea = document.getElementById('notesArea');
  const clearNotesBtn = document.getElementById('clearNotesBtn');

  const savedNotes = localStorage.getItem('dashboard_notes');
  if (savedNotes !== null) {
    notesArea.value = savedNotes;
  }

  notesArea.addEventListener('input', () => {
    localStorage.setItem('dashboard_notes', notesArea.value);
  });

  clearNotesBtn.addEventListener('click', () => {
    if (notesArea.value.trim() !== "") {
      if (confirm("Are you sure you want to clear your note?")) {
        notesArea.value = "";
        localStorage.removeItem('dashboard_notes');
      }
    }
  });
});
    document.addEventListener('DOMContentLoaded', () => {
  const searchForm = document.getElementById('searchForm');
  const engineSelect = document.getElementById('engineSelect');
  const searchInput = document.getElementById('searchInput');

  const engines = {
    google: {
      action: "https://www.google.com/search",
      queryParam: "q",
      placeholder: "Search Google..."
    },
    ddg: {
      action: "https://duckduckgo.com/",
      queryParam: "q",
      placeholder: "Search DuckDuckGo..."
    },
    bing: {
      action: "https://www.bing.com/search",
      queryParam: "q",
      placeholder: "Search Bing..."
    },
    wikipedia: {
      action: "https://en.wikipedia.org/w/index.php",
      queryParam: "search",
      placeholder: "Search Wikipedia..."
    },
    youtube: {
      action: "https://www.youtube.com/results",
      queryParam: "search_query",
      placeholder: "Search YouTube..."
    }
  };

  engineSelect.addEventListener('change', (e) => {
    const selectedEngine = engines[e.target.value];
    
    if (selectedEngine) {
      searchForm.action = selectedEngine.action;
      searchInput.name = selectedEngine.queryParam;
      searchInput.placeholder = selectedEngine.placeholder;
      
      searchInput.focus();
    }
  });
});

    (function () {
        var clock = document.getElementById('topbar-clock');

        if (!clock) {
            return;
        }

        var days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

        function pad(value) {
            return value < 10 ? '0' + value : String(value);
        }

        function updateClock() {
            var now = new Date();
            var hours = now.getHours();
            var minutes = pad(now.getMinutes());
            var seconds = pad(now.getSeconds());
            var suffix = hours >= 12 ? 'PM' : 'AM';
            var displayHours = hours % 12;

            if (displayHours === 0) {
                displayHours = 12;
            }

            clock.innerText = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear() + ' ' + displayHours + ':' + minutes + ' ' + suffix;
        }

        updateClock();
        window.setInterval(updateClock, 1000);
    }());
</script>
<script> // advanced scripts
    (function () {
        var weatherWidgetId = 'ww_3edbeed94f67f';
        var weatherStorageKey = 'gab644-weather-unit';
        var weatherWidget = document.getElementById('ww_3edbeed94f67f');
        var weatherUnitToggle = document.getElementById('weather-unit-toggle');
        var weatherRefresh = document.getElementById('weather-refresh');
        var weatherScriptUrl = 'https://app3.weatherwidget.org/js/?id=' + weatherWidgetId;
        var weatherWidgetDefaultText = 'Weather Data Source: <a href="https://wetterlang.de" id="ww_3edbeed94f67f_u" target="_blank">Wettervorschau 30 tage</a>';

        function getWeatherUnit() {
            try {
                return window.localStorage.getItem(weatherStorageKey) || 'celsius';
            } catch (error) {
                return 'celsius';
            }
        }

        function setWeatherUnit(unit) {
            var config;

            if (!weatherWidget) {
                return;
            }

            config = '{"t":"horizontal","lang":"en","sl_lpl":1,"ids":[],"font":"Arial","sl_ics":"one","sl_sot":"' + unit + '","cl_bkg":"#FFFFFF00","cl_font":"#000000","cl_cloud":"rgba(93,93,93,1)","cl_persp":"#2196F3","cl_sun":"#FFC107","cl_moon":"#FFC107","cl_thund":"#FF5722"}';
            weatherWidget.setAttribute('a', config);

            try {
                window.localStorage.setItem(weatherStorageKey, unit);
            } catch (error2) {
                return;
            }
        }

        function insertWeatherScript() {
            var existingScript;
            var newScript;

            if (!weatherWidget) {
                return;
            }

            existingScript = document.getElementById('weather-widget-script');
            if (existingScript && existingScript.parentNode) {
                existingScript.parentNode.removeChild(existingScript);
            }

            newScript = document.createElement('script');
            newScript.id = 'weather-widget-script';
            newScript.async = true;
            newScript.src = weatherScriptUrl + '&ts=' + new Date().getTime();

            if (weatherWidget.nextSibling) {
                weatherWidget.parentNode.insertBefore(newScript, weatherWidget.nextSibling);
            } else {
                weatherWidget.parentNode.appendChild(newScript);
            }
        }

        function rebuildWeatherWidget() {
            var weatherWidgetClone;

            if (!weatherWidget || !weatherWidget.parentNode) {
                return;
            }

            weatherWidgetClone = weatherWidget.cloneNode(false);
            weatherWidgetClone.innerHTML = weatherWidgetDefaultText;
            weatherWidget.parentNode.replaceChild(weatherWidgetClone, weatherWidget);
            weatherWidget = weatherWidgetClone;
            insertWeatherScript();
        }

        function refreshWeatherWidget() {
            rebuildWeatherWidget();
        }

        function updateWeatherToggleLabel() {
            if (!weatherUnitToggle) {
                return;
            }

            weatherUnitToggle.innerHTML = getWeatherUnit() === 'fahrenheit' ? 'Switch to °C' : 'Switch to °F';
        }

        if (weatherWidget && weatherUnitToggle && weatherRefresh) {
            setWeatherUnit(getWeatherUnit());
            updateWeatherToggleLabel();
            insertWeatherScript();

            weatherUnitToggle.onclick = function () {
                var nextUnit = getWeatherUnit() === 'fahrenheit' ? 'celsius' : 'fahrenheit';

                setWeatherUnit(nextUnit);
                updateWeatherToggleLabel();
                rebuildWeatherWidget();
            };

            weatherRefresh.onclick = function () {
                refreshWeatherWidget();
            };
        }

        var storageKey = 'gab644-shortcuts';
        var createPanelKey = 'gab644-shortcut-create-collapsed';
        var defaultShortcuts = [    
            { title: 'Music', url: 'music' },
            { title: 'Games', url: '/Flashy' },
            { title: 'Google News', url: 'https://news.google.com/home' }
        ];
        var createPanel = document.getElementById('shortcut-create-panel');
        var createToggle = document.getElementById('shortcut-create-toggle');
        var form = document.getElementById('shortcut-form');
        var titleInput = document.getElementById('shortcut-title');
        var urlInput = document.getElementById('shortcut-url');
        var list = document.getElementById('shortcut-list');
        var shortcuts;

        function trimText(value) {
            return String(value || '').replace(/^\s+|\s+$/g, '');
        }

        function loadShortcuts() {
            var raw = null;
            var parsed;
            var items;
            var index;

            try {
                raw = window.localStorage.getItem(storageKey);
            } catch (error) {
                raw = null;
            }

            if (!raw) {
                return defaultShortcuts.slice(0);
            }

            try {
                parsed = JSON.parse(raw);
            } catch (error2) {
                return defaultShortcuts.slice(0);
            }

            if (!parsed || typeof parsed.length !== 'number') {
                return defaultShortcuts.slice(0);
            }

            items = [];
            for (index = 0; index < parsed.length; index += 1) {
                if (parsed[index] && parsed[index].title && parsed[index].url) {
                    items.push({
                        title: String(parsed[index].title),
                        url: String(parsed[index].url)
                    });
                }
            }

            if (items.length === 0) {
                return defaultShortcuts.slice(0);
            }

            return items;
        }

        function saveShortcuts() {
            try {
                window.localStorage.setItem(storageKey, JSON.stringify(shortcuts));
            } catch (error) {
                return;
            }
        }

        function normalizeUrl(value) {
            var url = trimText(value);

            if (!url) {
                return '';
            }

            if (url.indexOf('http://') === 0 || url.indexOf('https://') === 0 || url.indexOf('/') === 0 || url.indexOf('#') === 0 || url.indexOf('mailto:') === 0) {
                return url;
            }

            return 'http://' + url;
        }

        function clearNode(node) {
            while (node.firstChild) {
                node.removeChild(node.firstChild);
            }
        }

        function isCreatePanelCollapsed() {
            try {
                return window.localStorage.getItem(createPanelKey) === 'true';
            } catch (error) {
                return false;
            }
        }

        function setCreatePanelCollapsed(isCollapsed) {
            if (!createPanel) {
                return;
            }

            createPanel.className = isCollapsed ? 'content-panel shortcut-create shortcut-create--collapsed' : 'content-panel shortcut-create';

            if (createToggle) {
                createToggle.appendChild(document.createTextNode(''));
                createToggle.innerHTML = isCollapsed ? 'Expand' : 'Collapse';
            }

            try {
                window.localStorage.setItem(createPanelKey, isCollapsed ? 'true' : 'false');
            } catch (error) {
                return;
            }
        }

        function moveShortcut(index, direction) {
            var nextIndex = index + direction;
            var temp;

            if (nextIndex < 0 || nextIndex >= shortcuts.length) {
                return;
            }

            temp = shortcuts[index];
            shortcuts[index] = shortcuts[nextIndex];
            shortcuts[nextIndex] = temp;
            saveShortcuts();
            renderShortcuts();
        }

        function removeShortcut(index) {
            if (!window.confirm('Are you sure you want to remove this shortcut?')) {
                return;
            }

            shortcuts.splice(index, 1);
            saveShortcuts();
            renderShortcuts();
        }

        function renderShortcuts() {
            var index;
            var item;
            var row;
            var link;
            var urlText;
            var actions;
            var upButton;
            var downButton;
            var removeButton;

            clearNode(list);

            if (shortcuts.length === 0) {
                item = document.createElement('div');
                item.className = 'shortcut-item';
                item.appendChild(document.createTextNode('No shortcuts yet. Add one above.'));
                list.appendChild(item);
                return;
            }

            for (index = 0; index < shortcuts.length; index += 1) {
                item = shortcuts[index];
                row = document.createElement('div');
                row.className = 'shortcut-item';

                link = document.createElement('a');
                link.className = 'shortcut-item__link';
                link.href = item.url;
                link.target = '_blank';
                link.rel = 'noopener noreferrer';
                link.appendChild(document.createTextNode(item.title));
                row.appendChild(link);

                urlText = document.createElement('div');
                urlText.className = 'shortcut-item__url';
                urlText.appendChild(document.createTextNode(item.url));
                row.appendChild(urlText);

                actions = document.createElement('div');
                actions.className = 'shortcut-item__actions';

                upButton = document.createElement('button');
                upButton.type = 'button';
                upButton.className = 'shortcut-item__button';
                upButton.appendChild(document.createTextNode('Up'));
                upButton.onclick = (function (shortcutIndex) {
                    return function () {
                        moveShortcut(shortcutIndex, -1);
                    };
                }(index));
                actions.appendChild(upButton);

                downButton = document.createElement('button');
                downButton.type = 'button';
                downButton.className = 'shortcut-item__button';
                downButton.appendChild(document.createTextNode('Down'));
                downButton.onclick = (function (shortcutIndex) {
                    return function () {
                        moveShortcut(shortcutIndex, 1);
                    };
                }(index));
                actions.appendChild(downButton);

                removeButton = document.createElement('button');
                removeButton.type = 'button';
                removeButton.className = 'shortcut-item__button';
                removeButton.appendChild(document.createTextNode('Remove'));
                removeButton.onclick = (function (shortcutIndex) {
                    return function () {
                        removeShortcut(shortcutIndex);
                    };
                }(index));
                actions.appendChild(removeButton);

                row.appendChild(actions);
                list.appendChild(row);
            }
        }

        function addShortcut() {
            var title = trimText(titleInput.value);
            var url = normalizeUrl(urlInput.value);

            if (!title || !url) {
                window.alert('Enter both a name and a URL.');
                return;
            }

            shortcuts.push({
                title: title,
                url: url
            });

            saveShortcuts();
            renderShortcuts();
            titleInput.value = '';
            urlInput.value = '';
            titleInput.focus();
        }

        shortcuts = loadShortcuts();

        if (createPanel && createToggle) {
            setCreatePanelCollapsed(isCreatePanelCollapsed());
            createToggle.onclick = function () {
                setCreatePanelCollapsed(!isCreatePanelCollapsed());
            };
        }

        if (form && titleInput && urlInput && list) {
            form.onsubmit = function (event) {
                if (event && event.preventDefault) {
                    event.preventDefault();
                }

                addShortcut();
                return false;
            };

            renderShortcuts();
        }
    }());
</script>
</body>
</html>
