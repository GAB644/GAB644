<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="index.css">
    <title>GAB644 online</title>
    <link rel="icon" type="image/x-icon" href="images/online/logo.png">
    <style>
        body {
            background-color: white;
            color: black;
            padding-top: 0px;
        }
        .logobar {
            background-color: rgb(179, 217, 240);
            image-rendering: pixelated;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            padding: 0 18px;
            box-sizing: border-box;
        }
        .topbar2 {
            background-color: gold;
            color: rgb(114, 69, 25);
            display: flex;
            align-items: center;
            padding: 0 18px;
            box-sizing: border-box;
            text-align: center;
            min-height: 34px;
        }
        .topbar2__links {
            display: flex;
            align-items: center;
        }
        .topbar2__links a {
            text-decoration: none;
            text-transform: uppercase;
            display: inline-block;
            margin-right: 8px;
        }
        .topbar2__links a:last-child {
            margin-right: 0;
        }
        .topbar2__clock {
            margin-left: auto;
            white-space: nowrap;
            font-size: 12px;
            font-weight: 700;
        }
        .page-content {
            margin-right: 350px;
        }
        .sidebar {
            position: fixed;
            top: 110px;
            right: 18px;
            width: 320px;
            z-index: 1;
            padding: 8px;
            box-sizing: border-box;
        }
        @media screen and (max-width: 980px) {
            .page-content {
                margin-right: 0;
            }
            .sidebar {
                position: static;
                width: auto;
                margin: 12px 18px 0;
            }
        }
    </style>
</head>
<body>
<div class="logobar">
    <img title="GAB644 online!" alt="GAB644 online!" height="70px"
            src="images/online/logo2.png"></img>&nbsp;&nbsp;
            <p style="font-size: 10px; color: rgb(124, 124, 124);">
                relived guesoo5 and based off of MSN</p><br>
</div>
<div class="topbar2">
    <div class="topbar2__links">
        <a href="/GAB644">GAB644 home</a>
        &#124;&nbsp;&nbsp;
        <a>News</a>
        &#124;&nbsp;&nbsp;
        <a href="/flashy">Games</a>
    </div>
    <div class="topbar2__clock" id="topbar-clock"></div>
</div>
<div class="page-content">
<iframe height="600px" width="780px" src="https://news.google.com/home/"></iframe>
<center><p>powered by google news</p></center>
</div>
<div class="sidebar">
    <script src="https://elfsightcdn.com/platform.js" async></script>
    <div class="elfsight-app-5d2357b1-fd5e-452c-8928-b37052f6bbf4" data-elfsight-app-lazy></div>
</div>


<script src="index.js" defer></script>
<script>
    (function () {
        var clock = document.getElementById('topbar-clock');

        if (!clock) {
            return;
        }

        var days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

        function pad(value) {
            return value < 10 ? '0' + value : String(value);
        }

        function updateClock() {
            var now = new Date();
            var hours = now.getHours();
            var minutes = pad(now.getMinutes());
            var seconds = pad(now.getSeconds());
            var suffix = hours >= 12 ? 'PM' : 'AM';
            var displayHours = hours % 12;

            if (displayHours === 0) {
                displayHours = 12;
            }

            clock.innerText = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear() + ' ' + displayHours + ':' + minutes + ' ' + suffix;
        }

        updateClock();
        window.setInterval(updateClock, 1000);
    }());
</script>
</body>
</html>
